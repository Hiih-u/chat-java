server:
  port: 8081

spring:
  application:
    name: chat-system
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.202.155:8848
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://192.168.202.155:61020/postgres
    username: postgres
    password: Hi8899
  # Redis 配置
  data:
    redis:
      host: 192.168.202.155
      port: 61300
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
  # 缓存配置
  cache:
    type: redis
    redis:
      time-to-live: 3600000  # 默认缓存过期时间 1小时（毫秒）
      cache-null-values: false  # 不缓存空值

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml