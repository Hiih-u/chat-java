server:
  port: 8000

spring:
  application:
    name: chat-gateway
  cloud:
    nacos:
      server-addr: 192.168.202.155:8848
      discovery:
        group: DEFAULT_GROUP
      config:
        file-extension: yaml
        group: DEFAULT_GROUP
    # 显式开启配置刷新（Spring Cloud 2023.x 默认已开启，此处明确声明防止被覆盖）
    refresh:
      enabled: true
  config:
    import:
      # refresh=true：告知 Nacos 客户端监听此 Data ID 的变更并推送 RefreshEvent
      - nacos:chat-gateway.yaml?group=DEFAULT_GROUP&refresh=true

# Actuator 暴露 refresh 端点（可手动触发刷新，也可用于验证）
management:
  endpoints:
    web:
      exposure:
        include: refresh,health,env
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    com.ai.chat: DEBUG
    # 开启 Nacos 配置刷新的 DEBUG 日志，方便排查热更新是否触发
    com.alibaba.cloud.nacos.refresh: DEBUG
    org.springframework.cloud.context.refresh: DEBUG
