server:
  port: 8000 #

spring:
  application:
    name: chat-gateway
  cloud:
    nacos:
      server-addr: 192.168.202.155:8848
      discovery:
        group: DEFAULT_GROUP
      config:
        file-extension: yaml
        group: DEFAULT_GROUP
  config:
    import:
      # 导入网关专属配置（包含路由规则和白名单）
      - nacos:chat-gateway.yaml?group=DEFAULT_GROUP&refresh=true

# 本地仅保留基础日志配置
logging:
  level:
    org.springframework.cloud.gateway: TRACE
    com.ai.chat: DEBUG