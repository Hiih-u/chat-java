spring:
  application:
    name: chat-gateway
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.202.155:8848
      config:
        server-addr: 192.168.202.155:8848
        file-extension: yaml
        namespace: ""        # 留空使用 public 命名空间，生产环境填写具体 namespace ID
        group: DEFAULT_GROUP
        # 本服务专属配置
        extension-configs:
          - data-id: chat-gateway.yaml
            group: DEFAULT_GROUP
            refresh: true
            optional: true   # Nacos 不存在该配置时不报错（开发阶段兜底）
