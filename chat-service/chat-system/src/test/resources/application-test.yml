spring:
  datasource:
    driver-class-name: org.h2.Driver
    # H2 内存数据库配置，启动时加载 schema-test.sql 脚本
    url: jdbc:h2:mem:chat_db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=RUNSCRIPT FROM 'classpath:schema-test.sql'
    username: sa
    password:
  h2:
    console:
      enabled: true
  cache:
    type: none # 单元测试中关闭 Cache，确保直接走数据库逻辑

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 打印 SQL 以便调试
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.ai.chat: DEBUG
