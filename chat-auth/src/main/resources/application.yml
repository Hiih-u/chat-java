server:
  port: 8082

# MyBatis-Plus 配置（框架级，不需要动态刷新）
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Spring Security 白名单（固定配置，不需要动态刷新）
auth:
  permit-urls:
    - /auth/login
    - /auth/register
    - /auth/captcha
    - /error
    - /actuator/**

# Feign 超时配置
feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 5000

# -------------------------------------------------------
# 以下配置已迁移到 Nacos，不再在本地维护：
#   spring.datasource      -> Nacos: common-datasource.yaml
#   spring.data.redis      -> Nacos: common-redis.yaml
#   jwt.secret / expire    -> Nacos: chat-auth.yaml
