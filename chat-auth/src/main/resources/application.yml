server:
  port: 8082

spring:
  application:
    name: chat-auth
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.202.155:8848
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://192.168.202.155:61020/postgres
    username: postgres
    password: Hi8899
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
  # Redis 配置
  data:
    redis:
      host: 192.168.202.155
      port: 61300
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: your-256-bit-secret-key-for-jwt-token-generation-please-change-in-production
  access-token-expire: 7200      # 访问令牌过期时间（秒）2小时
  refresh-token-expire: 604800   # 刷新令牌过期时间（秒）7天
  issuer: chat-auth

# 认证配置
auth:
  # 不需要认证的路径
  permit-urls:
    - /auth/login
    - /auth/register
    - /auth/captcha
    - /error
    - /actuator/**

# Feign 配置
feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 5000
  # chat-system 服务地址
  chat-system:
    url: http://localhost:8081
